<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>University Admission Form</title>
    <meta name="author" content="Kazi Sadman Zahin">
    <meta name="description" content="Online admission form for new university students.">
    <meta name="keywords" content="University Admission, Online Form, Student Registration">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <header>
        <h1>University Admission Form</h1>
        <p>Please fill out the form carefully to apply for admission.</p>
    </header>

    <main>

        <form action="#" method="post" enctype="multipart/form-data">

            <!-- ================= Personal Information ================= -->
            <fieldset>
                <legend><strong>Personal Information</strong></legend>

                <label for="fullname">Full Name:</label><br>
                <input type="text" id="fullname" name="fullname" maxlength="50" required><br><br>

                <label for="email">Email Address:</label><br>
                <input type="email" id="email" name="email" required><br><br>

                <label for="dob">Date of Birth:</label><br>
                <input type="date" id="dob" name="dob" required><br><br>

                <label>Gender:</label><br>
                <input type="radio" id="male" name="gender" value="Male" required>
                <label for="male">Male</label>

                <input type="radio" id="female" name="gender" value="Female">
                <label for="female">Female</label>

                <input type="radio" id="other" name="gender" value="Other">
                <label for="other">Other</label>
                <br><br>

                <label for="phone">Phone Number:</label><br>
                <input type="text" id="phone" name="phone" maxlength="15" required><br><br>
            </fieldset>

            <br>

            <!-- ================= Academic Information ================= -->
            <fieldset>
                <legend><strong>Academic Information</strong></legend>

                <label for="ssc">SSC GPA:</label><br>
                <input type="text" id="ssc" name="ssc" maxlength="4" required><br><br>

                <label for="hsc">HSC GPA:</label><br>
                <input type="text" id="hsc" name="hsc" maxlength="4" required><br><br>

                <label for="department">Preferred Department:</label><br>
                <select id="department" name="department" required>
                    <option value="">-- Select Department --</option>
                    <option value="CSE">Computer Science & Engineering</option>
                    <option value="EEE">Electrical & Electronic Engineering</option>
                    <option value="BBA">Business Administration</option>
                    <option value="LAW">Law</option>
                </select>
                <br><br>

                <label>Areas of Interest:</label><br>
                <input type="checkbox" id="ai" name="interest" value="Artificial Intelligence">
                <label for="ai">Artificial Intelligence</label><br>

                <input type="checkbox" id="web" name="interest" value="Web Development">
                <label for="web">Web Development</label><br>

                <input type="checkbox" id="data" name="interest" value="Data Science">
                <label for="data">Data Science</label><br><br>

                <label for="resume">Upload Transcript / Certificate:</label><br>
                <input type="file" id="resume" name="resume" required><br><br>

            </fieldset>

            <br>

            <!-- ================= Buttons ================= -->
            <input type="submit" value="Submit Application">
            <input type="reset" value="Reset Form">

        </form>

    </main>

    <footer>
        <p>&copy; 2026 University Admission System | All Rights Reserved</p>
    </footer>

</body>
</html>
